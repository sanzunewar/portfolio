{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Sanjeev Shrestha{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <a class="brand" href="{% url 'portfolio:home' %}">SS<span class="brand-dot">.</span></a>
      <div class="nav-links">
        <a href="{% url 'portfolio:home' %}">Home</a>
        <a href="{% url 'portfolio:projects' %}">Projects</a>
        <a href="{% url 'portfolio:about' %}">About</a>
      </div>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>&copy; {% now "Y" %} Sanjeev Shrestha</span>
      <span class="mono">sanjeevshrestha.info.np</span>
    </div>
  </footer>

  <!-- Signature element: AI assistant -->
  <button id="chat-launcher" class="chat-launcher" aria-label="Open chat assistant">
    <span class="chat-launcher-dot"></span> Ask my AI
  </button>

  <div id="chat-panel" class="chat-panel" role="dialog" aria-label="AI assistant" hidden>
    <div class="chat-head">
      <div>
        <strong>Assistant</strong>
        <span class="chat-sub mono">ask about my work</span>
      </div>
      <button id="chat-close" class="chat-close" aria-label="Close chat">&times;</button>
    </div>
    <div id="chat-log" class="chat-log">
      <div class="msg bot">Hi! I'm an AI assistant. Ask me anything about Sanjeev's projects, skills, or background.</div>
    </div>
    <form id="chat-form" class="chat-form">
      <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" maxlength="2000" aria-label="Your message">
      <button type="submit" aria-label="Send">&rarr;</button>
    </form>
  </div>

  <script src="{% static 'js/chat.js' %}"></script>
</body>
</html>
